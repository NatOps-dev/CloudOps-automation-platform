name: Deploy to AWS
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Kill the old container if it exists
            docker rm -f web-server || true
            
            # 2. Enter the app directory and force a clean state
            cd ~/app || git clone https://github.com/NatOps-dev/CloudOps-automation-platform.git ~/app
            cd ~/app
            git fetch origin main
            git reset --hard origin/main
            
            # 3. Build the image (Now it will find the Dockerfile in the root)
            docker build --no-cache -t my-devops .
            
            # 4. Run the new container
            docker run -d -p 80:80 --name web-server my-devops