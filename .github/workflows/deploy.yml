# New code to include a pull request
name: Deploy to AWS
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Navigate to the app directory
            cd ~/app
            
            # 2. Reset any local changes and pull the absolute latest code
            git fetch origin main
            git reset --hard origin/main
            
            # 3. Rebuild the image without using old cached layers
            docker build --no-cache -t my-devops .
            
            # 4. Kill the old container and start the new one
            docker rm -f web-server || true
            docker run -d -p 80:80 --name web-server my-devops

            script: |
